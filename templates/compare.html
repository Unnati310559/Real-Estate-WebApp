{% extends "base.html" %}

{% block title %}Compare Properties{% endblock %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.card {
    background: #2a2a40;
    color: white;
    border-radius: 12px;
}

label {
    color: #ccc;
}

.form-control {
    background: #1e1e2f;
    border: 1px solid #444;
    color: white;
}

.form-control::placeholder {
    color: #aaa;
}

.form-control:focus {
    border-color: #7f00ff;
    box-shadow: none;
    background: #1e1e2f;
    color: white;
}

.btn-dark {
    background: linear-gradient(45deg, #7f00ff, #e100ff);
    border: none;
    border-radius: 30px;
}

.result-card {
    margin-top: 40px;
}

.vs-box {
    font-size: 28px;
    color: #aaa;
}

.alert-success {
    background: #1e3d2f;
    color: #00ffae;
    border: none;
}

.alert-danger {
    background: #3d1e1e;
    color: #ff6b6b;
    border: none;
}
</style>

<div class="container mt-5">

<div class="card p-4">

<h2 class="text-center mb-4">🏠 Property Comparison Tool</h2>

<!-- ✅ FORM ADDED -->
<form onsubmit="compare(event)">

<div class="row">

<!-- PROPERTY A -->
<div class="col-md-6">
<h4 style="color:#7f00ff;">Property A</h4>

<input type="number" id="a_bed" class="form-control mb-2" placeholder="Bedrooms" required min="1">
<input type="number" id="a_bath" class="form-control mb-2" placeholder="Bathrooms" step="0.1" required min="0.5">
<input type="number" id="a_sqft" class="form-control mb-2" placeholder="Sqft Living" required min="1">
<input type="number" id="a_grade" class="form-control mb-2" placeholder="Grade (1-13)" required>
<input type="number" id="a_condition" class="form-control mb-2" placeholder="Condition (1-5)" required>
<input type="number" id="a_year" class="form-control mb-2" placeholder="Year Built" required>
<input type="number" id="a_sold" class="form-control mb-2" placeholder="Year Sold" required>
<input type="text" id="a_lat" class="form-control mb-2" placeholder="Latitude" required>
<input type="text" id="a_long" class="form-control mb-2" placeholder="Longitude" required>

<hr>

<input type="number" id="a_rent" class="form-control mb-2" placeholder="Annual Rent (₹)" required min="1">
<input type="number" id="a_exp" class="form-control mb-2" placeholder="Expenses (₹)" required min="0">
<input type="number" id="a_loan" class="form-control mb-2" placeholder="Loan (₹)" required min="0">
<input type="number" id="a_years" class="form-control mb-2" placeholder="Years" required min="1">

</div>

<!-- PROPERTY B -->
<div class="col-md-6">
<h4 style="color:#00c6ff;">Property B</h4>

<input type="number" id="b_bed" class="form-control mb-2" placeholder="Bedrooms" required min="1">
<input type="number" id="b_bath" class="form-control mb-2" placeholder="Bathrooms" step="0.1" required min="0.5">
<input type="number" id="b_sqft" class="form-control mb-2" placeholder="Sqft Living" required min="1">
<input type="number" id="b_grade" class="form-control mb-2" placeholder="Grade (1-13)" required>
<input type="number" id="b_condition" class="form-control mb-2" placeholder="Condition (1-5)" required>
<input type="number" id="b_year" class="form-control mb-2" placeholder="Year Built" required>
<input type="number" id="b_sold" class="form-control mb-2" placeholder="Year Sold" required>
<input type="text" id="b_lat" class="form-control mb-2" placeholder="Latitude" required>
<input type="text" id="b_long" class="form-control mb-2" placeholder="Longitude" required>

<hr>

<input type="number" id="b_rent" class="form-control mb-2" placeholder="Annual Rent (₹)" required min="1">
<input type="number" id="b_exp" class="form-control mb-2" placeholder="Expenses (₹)" required min="0">
<input type="number" id="b_loan" class="form-control mb-2" placeholder="Loan (₹)" required min="0">
<input type="number" id="b_years" class="form-control mb-2" placeholder="Years" required min="1">

</div>

</div>

<div class="text-center mt-4">
<button type="submit" class="btn btn-dark btn-lg">Compare Now</button>
</div>

</form>

</div>

<div id="result" class="result-card"></div>

</div>

<script>
async function compare(event) {

    event.preventDefault(); // 🚨 stops page reload

    try {

        const data = {
            property1: {
                bedrooms: +a_bed.value,
                bathrooms: +a_bath.value,
                sqft_living: +a_sqft.value,
                grade: +a_grade.value,
                condition: +a_condition.value,
                yr_built: +a_year.value,
                year_sold: +a_sold.value,
                lat: +a_lat.value,
                long: +a_long.value,
                rent: +a_rent.value,
                expenses: +a_exp.value,
                loan: +a_loan.value,
                years: +a_years.value
            },
            property2: {
                bedrooms: +b_bed.value,
                bathrooms: +b_bath.value,
                sqft_living: +b_sqft.value,
                grade: +b_grade.value,
                condition: +b_condition.value,
                yr_built: +b_year.value,
                year_sold: +b_sold.value,
                lat: +b_lat.value,
                long: +b_long.value,
                rent: +b_rent.value,
                expenses: +b_exp.value,
                loan: +b_loan.value,
                years: +b_years.value
            }
        };

        const res = await fetch("/api/compare", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        if (!res.ok) throw new Error("Server error");

        const result = await res.json();

        document.getElementById("result").innerHTML = `
        <div class="card p-4">

            <h4 class="text-center mb-4">📊 Comparison Result</h4>

            <div class="row text-center">

                <div class="col-md-5">
                    <div class="card p-3">
                        <h5 style="color:#7f00ff;">Property A</h5>
                        <p>₹ ${result.property1.price.toLocaleString()}</p>
                        <p>ROI: ${result.property1.roi.toFixed(2)}%</p>
                        <p>IRR: ${result.property1.irr.toFixed(2)}%</p>
                    </div>
                </div>

                <div class="col-md-2 d-flex align-items-center justify-content-center">
                    <div class="vs-box">VS</div>
                </div>

                <div class="col-md-5">
                    <div class="card p-3">
                        <h5 style="color:#00c6ff;">Property B</h5>
                        <p>₹ ${result.property2.price.toLocaleString()}</p>
                        <p>ROI: ${result.property2.roi.toFixed(2)}%</p>
                        <p>IRR: ${result.property2.irr.toFixed(2)}%</p>
                    </div>
                </div>

            </div>

            <div class="text-center mt-4">
                <div class="alert alert-success">
                    🏆 Best Investment: 
                    <b>${result.property1.roi > result.property2.roi ? "Property A" : "Property B"}</b>
                </div>
            </div>

        </div>
        `;
        document.getElementById("result").scrollIntoView({
    behavior: "smooth"
});

    } catch (err) {
        document.getElementById("result").innerHTML = `
        <div class="alert alert-danger text-center">
            ❌ Error comparing properties. Try again.
        </div>`;
    }
}
</script>

{% endblock %}
