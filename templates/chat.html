<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f1f1f1; }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }

        .user-msg { text-align: right; margin: 10px 0; }
        .bot-msg { text-align: left; margin: 10px 0; }

        .msg {
            display: inline-block;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
        }

        .user { background-color: #0d6efd; color: white; }
        .bot { background-color: #e9ecef; }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card shadow p-3">

        <h4 class="text-center mb-3">AI Real Estate Assistant 🤖</h4>

        <div id="chatBox" class="chat-box"></div>

        <div class="input-group mt-3">
            <input type="text" id="msg" class="form-control" placeholder="Ask something...">
            <button class="btn btn-primary" onclick="sendMsg()">Send</button>
        </div>

    </div>
</div>

<script>

function appendMessage(text, type) {
    const chatBox = document.getElementById("chatBox");

    const div = document.createElement("div");
    div.className = type === "user" ? "user-msg" : "bot-msg";

    const span = document.createElement("span");
    span.className = "msg " + type;
    span.innerText = text;

    div.appendChild(span);
    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMsg() {
    const input = document.getElementById("msg");
    const message = input.value;

    if (!message) return;

    appendMessage(message, "user");
    input.value = "";

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        appendMessage(data.response, "bot");
    });
}

// Enter key support
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMsg();
    }
});

</script>

</body>
</html>
