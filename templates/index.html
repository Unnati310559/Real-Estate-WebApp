{% extends "base.html" %}

{% block title %}Analyze Property{% endblock %}

{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* CARD */
.card {
    background: #2a2a40;
    color: white;
    border: none;
}

/* LABELS */
label {
    color: #ccc;
    font-weight: 500;
}

/* INPUT FIELDS */
.form-control {
    background: #1e1e2f;
    border: 1px solid #444;
    color: white;
}

.form-control:focus {
    background: #1e1e2f;
    color: white;
    border-color: #7f00ff;
    box-shadow: none;
}

/* HEADINGS */
h2, h4 {
    color: white;
}

/* BUTTON */
.btn-primary {
    background: linear-gradient(45deg, #7f00ff, #e100ff);
    border: none;
    padding: 12px 30px;
    border-radius: 30px;
    font-size: 16px;
}

.btn-primary:hover {
    transform: scale(1.05);
}
</style>

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">AI Real Estate Investment Analyzer</h2>

        <form action="/analyze" method="POST">

            <h4 class="mb-3">Property Details</h4>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>Bedrooms</label>
                    <input type="number" class="form-control" name="bedrooms" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Bathrooms</label>
                    <input type="number" step="0.1" class="form-control" name="bathrooms" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label>Sqft Living</label>
                    <input type="number" class="form-control" name="sqft_living" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 mb-3">
                    <label>Grade (1-13)</label>
                    <input type="number" class="form-control" name="grade" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label>Condition (1-5)</label>
                    <input type="number" class="form-control" name="condition" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label>Year Built</label>
                    <input type="number" class="form-control" name="yr_built" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label>Year Sold</label>
                    <input type="number" class="form-control" name="year_sold" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Latitude</label>
                    <input type="text" class="form-control" name="lat" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Longitude</label>
                    <input type="text" class="form-control" name="long" required>
                </div>
            </div>

            <hr style="border-color:#444;">

            <h4 class="mb-3">Financial Details</h4>

            <div class="row">
                <div class="col-md-3 mb-3">
                    <label>Annual Rent (₹)</label>
                    <input type="number" class="form-control" name="annual_rent" required min="1">
                </div>

                <div class="col-md-3 mb-3">
                    <label>Annual Expenses (₹)</label>
                    <input type="number" class="form-control" name="annual_expenses" required min="0">
                </div>

                <div class="col-md-3 mb-3">
                    <label>Annual Loan Payment (₹)</label>
                    <input type="number" class="form-control" name="annual_loan_payment" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label>Investment Years</label>
                    <input type="number" class="form-control" name="years" required min="1">
                </div>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-primary btn-lg">Analyze Investment</button>
            </div>

        </form>
    </div>
</div>

{% endblock %}
